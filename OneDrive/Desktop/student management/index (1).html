    /* ===== TOAST ===== */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { padding: 13px 22px; border-radius: 14px; color: white; font-weight: 600; font-size: 0.9rem; box-shadow: 0 6px 20px rgba(0,0,0,0.25); animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1); pointer-events: auto; max-width: 320px; display: flex; align-items: center; gap: 10px; }
    .toast.success { background: linear-gradient(135deg, #1f5437, #2e7d4e); }
    .toast.error { background: linear-gradient(135deg, #c82333, #dc3545); }
    .toast.info { background: linear-gradient(135deg, #1a5276, #2980b9); }

    @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

    .sidebar-overlay.open { display: block; }

      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 15px 16px; }
      .top-bar { padding: 12px 16px; }
      .profile-grid { flex-direction: column; align-items: center; }
      .course-table th, .course-table td { padding: 8px 6px; font-size: 0.85rem; }
    }
  </style>
</head>

  <script>

    let currentStudent = null;

    const studentsDB = [
      { id: 1, name: 'Kwame Asare', indexNumber: 'AGRI/2024/001', password: 'student123', email: 'kwame.asare@ekow.edu', phone: '+233 24 412 3456', dateOfBirth: '2001-05-15', program: 'BSc. Agriculture', year: 2, semester: 1, profilePic: null, registeredCourses: ['AGR101','AGR102','AGR103'], results: [{ code:'AGR101', name:'Introduction to Agronomy', grade:'A', credits:3 }, { code:'AGR102', name:'Soil Science', grade:'B+', credits:3 }, { code:'AGR103', name:'Crop Protection', grade:'A-', credits:3 }], videos: [] },
      { id: 2, name: 'Ama Serwaa', indexNumber: 'AGRI/2024/002', password: 'student123', email: 'ama.serwaa@ekow.edu', phone: '+233 24 478 9012', dateOfBirth: '2002-08-22', program: 'BSc. Agriculture', year: 2, semester: 1, profilePic: null, registeredCourses: ['AGR104','AGR105'], results: [], videos: [] },
      { id: 3, name: 'Yaw Boateng', indexNumber: 'AGRI/2024/003', password: 'student123', email: 'yaw.boateng@ekow.edu', phone: '+233 20 556 7890', dateOfBirth: '2001-11-30', program: 'BSc. Agribusiness', year: 1, semester: 1, profilePic: null, registeredCourses: [], results: [], videos: [] }

    // ===================== TOAST =====================
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');

      const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', warning: 'fa-exclamation-circle' };
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('removing'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ===================== LANDING =====================
    function renderLanding() {
      document.getElementById('appRoot').innerHTML = `

      document.getElementById('togglePassword')?.addEventListener('click', () => {
        const input = document.getElementById('loginPass');

      function attemptLogin() {
        const idx = document.getElementById('loginIndex').value.trim();
        const pwd = document.getElementById('loginPass').value;
        const student = students.find(s => s.indexNumber === idx && s.password === pwd);
        if (student) {
          localStorage.setItem('ekow_current_student', JSON.stringify(student));
          currentStudent = student;

    function attachNavEvents() {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          const page = item.getAttribute('data-page');
          if (page === 'logout') {
            localStorage.removeItem('ekow_current_student');
            currentStudent = null;
            showToast('Logged out. Goodbye!', 'info');
            setTimeout(renderLanding, 500);
          } else {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            document.getElementById('mainSidebar')?.classList.remove('open');
            document.getElementById('sidebarOverlay')?.classList.remove('open');
            loadDashboardPage(page);
          }
        });
      });
    }

    function loadDashboardPage(page) {
      const titles = { profile:'My Profile', register:'Course Registration', results:'Academic Results', videos:'My Videos' };
      const t = document.getElementById('pageTitle');
      if (t) t.innerText = titles[page] || 'Dashboard';
      if (page === 'profile') renderStudentProfile();
      else if (page === 'register') renderStudentRegistration();
      else if (page === 'results') renderStudentResults();
      else if (page === 'videos') renderStudentVideos();
    }

    function syncStudent() {
      const i = students.findIndex(s => s.id === currentStudent.id);
      if (i > -1) { students[i] = currentStudent; saveStudents(); }
      localStorage.setItem('ekow_current_student', JSON.stringify(currentStudent));

                }).join('')}

            </table>

    window.toggleCourse = function(code) {
      if (!currentStudent.registeredCourses) currentStudent.registeredCourses = [];
      const idx = currentStudent.registeredCourses.indexOf(code);
      if (idx > -1) {
        currentStudent.registeredCourses.splice(idx, 1);
        showToast('Course dropped successfully.', 'error');
      } else {
        if (currentStudent.registeredCourses.length >= 5) { showToast('Maximum 5 courses per semester allowed.', 'warning'); return; }
        currentStudent.registeredCourses.push(code);
        showToast('Course registered successfully!', 'success');
      }
      syncStudent();
      renderStudentRegistration();
    };

    // ===================== RESULTS =====================
    function renderStudentResults() {
      const results = currentStudent.results || [];
      const gradePoints = { 'A':4.0, 'A-':3.7, 'B+':3.3, 'B':3.0, 'B-':2.7, 'C+':2.3, 'C':2.0, 'C-':1.7, 'D':1.0, 'F':0 };
      let gpa = '0.00', totalCredits = 0;
      if (results.length > 0) {
        let tp = 0;
        results.forEach(r => { const pts = gradePoints[r.grade] !== undefined ? gradePoints[r.grade] : 0; tp += pts * r.credits; totalCredits += r.credits; });
        gpa = totalCredits > 0 ? (tp / totalCredits).toFixed(2) : '0.00';
      }
      const gpaNum = parseFloat(gpa);
      const gpaColor = gpaNum >= 3.5 ? '#1f5437' : gpaNum >= 3.0 ? '#2980b9' : gpaNum >= 2.0 ? '#e67e22' : '#c0392b';
      const gpaLabel = gpaNum >= 3.5 ? 'First Class' : gpaNum >= 3.0 ? 'Second Class Upper' : gpaNum >= 2.0 ? 'Second Class Lower' : gpaNum >= 1.0 ? 'Third Class' : '—';
      const getGradeClass = g => g.startsWith('A') ? 'grade-a' : g.startsWith('B') ? 'grade-b' : g.startsWith('C') ? 'grade-c' : g === 'F' ? 'grade-f' : '';
      document.getElementById('pageContent').innerHTML = `
        <div class="dashboard-card">
          <div class="card-title"><i class="fas fa-chart-line" style="color:#ffcf4a;margin-right:8px;"></i>Academic Results</div>
          <div class="result-gpa">
            <div class="gpa-badge">
              <div class="gpa-number" style="color:${gpaColor};">${gpa}</div>
              <div class="gpa-label">Cumulative GPA</div>
            </div>
            <div style="text-align:left;">
              <div style="font-size:1.1rem;font-weight:700;color:#1f3b2c;">${currentStudent.name}</div>
              <div style="font-size:0.88rem;color:#5f7c6b;">${currentStudent.program}</div>
              <div style="margin-top:8px;font-weight:600;color:${gpaColor};">${gpaLabel}</div>
              <div style="font-size:0.82rem;color:#5f7c6b;margin-top:4px;">${totalCredits} credit hours completed</div>
            </div>
          </div>
          ${results.length === 0
            ? `<div style="text-align:center;padding:40px;color:#5f7c6b;"><i class="fas fa-inbox" style="font-size:2.5rem;margin-bottom:12px;opacity:0.4;display:block;"></i><p>No results available yet.</p></div>`
            : `<div style="overflow-x:auto;"><table class="course-table">
                <thead><tr><th>Code</th><th>Course Name</th><th style="text-align:center;">Credits</th><th style="text-align:center;">Grade</th><th style="text-align:center;">Points</th></tr></thead>
                <tbody>
                  ${results.map(r => {
                    const pts = ((gradePoints[r.grade] || 0) * r.credits).toFixed(1);
                    return `<tr>
                      <td style="font-family:monospace;font-weight:600;color:#1f5437;">${r.code}</td>
                      <td>${r.name}</td>
                      <td style="text-align:center;">${r.credits}</td>
                      <td style="text-align:center;"><span class="${getGradeClass(r.grade)}">${r.grade}</span></td>
                      <td style="text-align:center;color:#5f7c6b;">${pts}</td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table></div>`
          }
        </div>
      `;
    }

    // ===================== VIDEOS =====================
    function renderStudentVideos() {
      const videos = currentStudent.videos || [];
      document.getElementById('pageContent').innerHTML = `
        <div class="dashboard-card">
          <div class="card-title"><i class="fas fa-video" style="color:#ffcf4a;margin-right:8px;"></i>My Videos</div>
          <div class="video-upload-area" id="videoUploadArea">
            <i class="fas fa-cloud-upload-alt" style="font-size:2.5rem;color:#1f5437;margin-bottom:12px;display:block;"></i>
            <h3 style="color:#1f3b2c;margin-bottom:6px;">Click to Upload Video</h3>
            <p style="color:#5f7c6b;font-size:0.88rem;">Supports MP4, WebM, MOV</p>
            <input type="file" id="videoFileInput" accept="video/*" style="display:none;">
          </div>
          <div class="upload-progress-bar hidden" id="progressBarWrapper"><div class="upload-progress-fill" id="progressFill"></div></div>
          <div id="videoList" style="margin-top:20px;">
            ${videos.length === 0
              ? `<p style="text-align:center;color:#5f7c6b;padding:20px;"><i class="fas fa-film" style="margin-right:6px;opacity:0.5;"></i>No videos uploaded yet.</p>`
              : videos.map(v => `
                  <div class="video-item">
                    <div class="video-thumbnail" onclick="playVideo(${v.id})"><i class="fas fa-play"></i></div>
                    <div style="flex:1;min-width:0;">
                      <div style="font-weight:600;color:#1f3b2c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${v.name}</div>
                      <div style="font-size:0.82rem;color:#5f7c6b;margin-top:4px;"><i class="fas fa-calendar-alt" style="margin-right:4px;"></i>${v.date}</div>
                      ${!sessionVideoStore[v.id] ? `<div style="font-size:0.78rem;color:#e67e22;margin-top:4px;"><i class="fas fa-exclamation-triangle"></i> Re-upload to play (session ended)</div>` : ''}
                    </div>
                    <button class="delete-video" onclick="deleteVideo(${v.id})"><i class="fas fa-trash"></i> Delete</button>
                  </div>`).join('')
            }
          </div>
        </div>
      `;
      document.getElementById('videoUploadArea')?.addEventListener('click', () => document.getElementById('videoFileInput').click());
      document.getElementById('videoFileInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('video/')) { showToast('Please select a video file.', 'error'); return; }
        if (file.size > 200 * 1024 * 1024) { showToast('File too large. Max 200MB.', 'error'); return; }
        const wrapper = document.getElementById('progressBarWrapper');
        const fill = document.getElementById('progressFill');
        wrapper?.classList.remove('hidden');
        let progress = 0;
        const interval = setInterval(() => { progress = Math.min(progress + Math.random() * 20, 90); if (fill) fill.style.width = progress + '%'; }, 150);
        const id = ++videoIdCounter;
        sessionVideoStore[id] = URL.createObjectURL(file);
        if (!currentStudent.videos) currentStudent.videos = [];
        currentStudent.videos.push({ id, name: file.name, date: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) });
        syncStudent();
        setTimeout(() => {
          clearInterval(interval);
          if (fill) fill.style.width = '100%';
          setTimeout(() => { showToast('Video uploaded successfully!', 'success'); renderStudentVideos(); }, 400);
        }, 1000);
      });
    }

    window.playVideo = function(id) {
      const src = sessionVideoStore[id];
      if (!src) { showToast('Video unavailable. Please re-upload to play.', 'warning'); return; }
      const vid = document.getElementById('modalVideo');
      const modal = document.getElementById('videoModal');
      if (vid && modal) { vid.src = src; modal.style.display = 'flex'; vid.play(); }
    };

    window.deleteVideo = function(id) {
      if (!currentStudent.videos) return;
      currentStudent.videos = currentStudent.videos.filter(v => v.id !== id);
      if (sessionVideoStore[id]) { URL.revokeObjectURL(sessionVideoStore[id]); delete sessionVideoStore[id]; }
      syncStudent();
      showToast('Video deleted.', 'error');
      renderStudentVideos();
    };

    // ===================== MODAL =====================
    document.getElementById('closeModalBtn')?.addEventListener('click', () => {
      const modal = document.getElementById('videoModal');
      const vid = document.getElementById('modalVideo');
      if (modal) modal.style.display = 'none';
      if (vid) { vid.pause(); vid.src = ''; }
    });
    document.getElementById('videoModal')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('videoModal')) {
        document.getElementById('videoModal').style.display = 'none';
        const vid = document.getElementById('modalVideo');
        if (vid) { vid.pause(); vid.src = ''; }
      }
    });

    // ===================== INIT =====================
    const storedStudent = localStorage.getItem('ekow_current_student');
    if (storedStudent) {
      try { currentStudent = JSON.parse(storedStudent); renderDashboard(); }
      catch (e) { localStorage.removeItem('ekow_current_student'); renderLanding(); }
    } else {
      renderLanding();
    }
  </script>
</body>
</html>
